# SonarQube Developer Edition with PostgreSQL
# Use this for production deployment with PostgreSQL database
#
# Usage:
#   docker compose -f docker-compose.sonarqube-developer.yml up -d
#
# Or with custom DB password:
#   SONAR_DB_PASSWORD=your_password docker compose -f docker-compose.sonarqube-developer.yml up -d
#
# Requires SonarQube Developer edition license (~€150/year)
# Free trial available at: https://www.sonarsource.com/products/developer/

services:
  sonarqube:
    image: sonarqube:2025-lta-developer
    container_name: sonarqube
    ports:
      - "9000:9000"
    environment:
      - SONAR_JDBC_URL=jdbc:postgresql://postgres:5432/sonarqube
      - SONAR_JDBC_USERNAME=sonarqube
      - SONAR_JDBC_PASSWORD=${SONAR_DB_PASSWORD:-sonarpass}
      - SONAR_WEB_CONTEXT=/
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sonarnet

  postgres:
    image: postgres:16
    container_name: sonarqube-db
    environment:
      - POSTGRES_DB=sonarqube
      - POSTGRES_USER=sonarqube
      - POSTGRES_PASSWORD=${SONAR_DB_PASSWORD:-sonarpass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonarqube"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sonarnet

volumes:
  sonarqube_data:
  sonarqube_logs:
  sonarqube_extensions:
  postgres_data:

networks:
  sonarnet:
    driver: bridge