# SonarQube Configuration for Go Project

# Project identification (for local self-hosted SonarQube)
sonar.projectKey=ci
sonar.projectName=ci
sonar.projectVersion=1.0

# Host URL (use http://localhost:9000 for local, update for self-hosted server)
sonar.host.url=http://localhost:9000

# Source configuration
sonar.sources=.
sonar.sourceEncoding=UTF-8

# Exclude test files and generated code from main analysis
sonar.exclusions=**/*_test.go,**/vendor/**,**/scripts/**

# Test configuration
sonar.tests=.
sonar.test.inclusions=**/*_test.go

# Go coverage report path
sonar.go.coverage.reportPaths=coverage.out

# golangci-lint report
sonar.go.golangci-lint.reportPaths=golangci-lint-report.xml

# SCM provider (Git)
sonar.scm.provider=git
