# SonarCloud Configuration for Go Project

# Project identification
sonar.projectKey=irwantocia-eng_ci
sonar.organization=irwantocia-eng
sonar.projectName=ci
sonar.projectVersion=1.0

# Source configuration
sonar.sources=.
sonar.sourceEncoding=UTF-8

# Exclude test files and generated code from main analysis
sonar.exclusions=**/*_test.go,**/vendor/**,**/scripts/**

# Test configuration
sonar.tests=.
sonar.test.inclusions=**/*_test.go

# Go coverage report path
sonar.go.coverage.reportPaths=coverage.out

# golangci-lint SARIF report
sonar.externalIssuesReportPaths=golangci-lint.sarif

# SCM provider (Git)
sonar.scm.provider=git
sonar.scm.forceReloadAll=false

# Quality Gate
# Pass if: coverage > 60%, no new bugs, no new vulnerabilities
sonar.qualitygate.wait=true

# Analysis mode
sonar.analysis.mode=publish

# Verbose logging for debugging
# sonar.verbose=true
