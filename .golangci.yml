version: "2"

linters:
  default: none
  enable:
    # Defaults
    - errcheck
    - govet
    - staticcheck
    - unused
    # Recommended additions
    - bodyclose
    - gosec
    - revive
    - unconvert
    - unparam
    # Additional useful linters
    - gocyclo
    - misspell
    - prealloc

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

run:
  timeout: 5m
  modules-download-mode: readonly
  allow-parallel-runners: true