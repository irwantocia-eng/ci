version: "2"

linters:
  default: all
  enable:
    - gosec
    - errcheck
    - staticcheck
    - govet
    - revive
    - gocyclo
    - misspell
    - unparam
    - unused
    - prealloc
    - bodyclose
  settings:
    revive:
      rules:
        exported: warning
        package-comments: warning
    gosec:
      excludes:
        - G104
    gocyclo:
      min-complexity: 15

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

run:
  timeout: 5m
  modules-download-mode: readonly
  allow-parallel-runners: true