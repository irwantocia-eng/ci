version: "2"

linters:
  default: none
  enable:
    - gosec
    - errcheck
    - staticcheck
    - govet
    - revive
    - gocyclo
    - misspell
    - unparam
    - unused
    - prealloc
    - bodyclose

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

run:
  timeout: 5m
  modules-download-mode: readonly
  allow-parallel-runners: true